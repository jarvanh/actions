name: pornhub-dl

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:
  watch:
    types: started

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: rclone-install
        run: |
          # 安装 rclone
          curl -O https://downloads.rclone.org/rclone-current-linux-amd64.zip
          unzip rclone-current-linux-amd64.zip
          cd rclone-*-linux-amd64
          sudo mv rclone /usr/bin
          sudo chmod +x /usr/bin/rclone
      - name: rclone-config
        env:
          RCLONE_CONFIG: ${{ secrets.RCLONE }}
        run: |
          # 写配置文件
          mkdir -p ~/.config/rclone/
          cat << EOF > ~/.config/rclone/rclone.conf
          $RCLONE_CONFIG
          EOF
      - name: rclone-run
        run: |
          sudo apt-get install fuse3
          mkdir ~/onedrive
          nohup rclone --vfs-cache-mode full mount onedrive: ~/onedrive &
          echo "~/onedrive 文件列表"
          cd ~/onedrive
          ls
      - name: run pornhub-dl favorites
        run: |
          sudo apt-get update
          sudo apt-get install python3 -y
          sudo apt-get install ffmpeg -y
          pip3 install --upgrade yt-dlp
          cd ~
          cd ~/onedrive/0/j-1024j-视频-pornhub-favorites
          echo "favorites文件列表"
          ls
          echo "favorites文件夹 下载前大小"
          du -sh ~/onedrive/0/j-1024j-视频-pornhub-favorites
          BEFORE_COUNT=$(wc -l < archive.txt 2>/dev/null || echo 0)
          # yt-dlp -f bestvideo+bestaudio/best --force-overwrites --no-part -i https://www.pornhub.com/users/'${{ secrets. PORNHUBNAME }}'/videos/favorites || echo "url不存在"
          yt-dlp -f bestvideo+bestaudio/best --force-overwrites --no-part --download-archive archive.txt -i https://www.pornhub.com/users/'${{ secrets. PORNHUBNAME }}'/videos/favorites || echo "url不存在"
          AFTER_COUNT=$(wc -l < archive.txt 2>/dev/null || echo 0)
          DOWNLOAD_COUNT=$((AFTER_COUNT - BEFORE_COUNT))
          if [ "$DOWNLOAD_COUNT" -lt 0 ]; then
            DOWNLOAD_COUNT=0
          fi
          echo "本次新增下载数量: ${DOWNLOAD_COUNT}"
          echo "favorites文件夹 下载后大小"
          du -sh ~/onedrive/0/j-1024j-视频-pornhub-favorites
          curl -s -X POST https://api.telegram.org/bot'${{ secrets.TELEGRAM_BOT_TOKEN }}'/sendMessage \
            -d chat_id='${{ secrets.TELEGRAM_CHAT_ID }}' \
            -d text="github p站下载任务执行完毕 favorites，本次下载 ${DOWNLOAD_COUNT} 个视频"
