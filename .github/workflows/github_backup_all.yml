name: Backup All GitHub Repositories to Dropbox

on:
  schedule:
    - cron: '0 3 * * *' # 每天凌晨3点运行
  workflow_dispatch:

concurrency:
  group: backup-repos
  cancel-in-progress: false

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Setup rclone
        env:
          RCLONE_CONFIG: ${{ secrets.RCLONE }}
        run: |
          sudo apt-get install -y rclone
          mkdir -p ~/.config/rclone/
          printf "%s" "$RCLONE_CONFIG" > ~/.config/rclone/rclone.conf

      - name: Backup all repositories
        env:
          GH_TOKEN: ${{ secrets.PAT }}
        run: |
          # 💡 修改：使用固定压缩包名，不再使用日期后缀
          ARCHIVE_NAME="github_repos_latest.tar.gz"
          BACKUP_DIR="github_backup_temp"
          mkdir -p $BACKUP_DIR
          
          # 获取用户所有的仓库 (包括 private 和 public)
          REPOS=$(curl -s -H "Authorization: token $GH_TOKEN" "https://api.github.com/user/repos?per_page=100&type=owner" | jq -r '.[].ssh_url')
          
          if [ -z "$REPOS" ]; then
            echo "未找到任何仓库，请检查 PAT 权限。"
            exit 1
          fi
          
          for REPO in $REPOS; do
            REPO_NAME=$(basename $REPO .git)
            echo "----------------------------------------"
            echo "正在处理仓库: $REPO_NAME ..."
            
            CLONE_URL=$(echo $REPO | sed -e "s/git@github.com:/https:\/\/$GH_TOKEN@github.com\//")
            
            git clone --mirror "$CLONE_URL" "$BACKUP_DIR/$REPO_NAME.git" || {
              echo "❌ $REPO_NAME 备份失败（可能已被 GitHub 禁用或访问受限），跳过此仓库。"
              rm -rf "$BACKUP_DIR/$REPO_NAME.git"
            }
          done
          
          echo "----------------------------------------"
          echo "正在打包所有备份成功的仓库..."
          tar -czf "$ARCHIVE_NAME" "$BACKUP_DIR"
          
          echo "正在上传到 Dropbox (覆盖旧备份)..."
          # 💡 修改：直接覆盖 Dropbox 上的最新备份包
          rclone copy "$ARCHIVE_NAME" "dropbox:" -P --retries 3
          
      - name: Send Telegram Notification
        if: always()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          STATUS: ${{ job.status }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "Telegram 凭证未配置，跳过发送通知。"
            exit 0
          fi
          
          if [ "$STATUS" == "success" ]; then
            MSG="✅ <b>GitHub 全仓库备份成功 (已覆盖旧包)</b>%0A📅 日期: $(date +'%Y-%m-%d')%0A📦 文件: github_repos_latest.tar.gz"
          else
            MSG="❌ <b>GitHub 全仓库备份失败</b>%0A⚠️ 请前往 GitHub Actions 检查日志详情。"
          fi
          
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d text="$(echo -e $MSG)" \
            -d parse_mode="HTML"
