name: openclaw

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  build:
    concurrency: openclaw-singleton
    runs-on: ubuntu-latest
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 'current' # 始终使用官方发布的最新版

      - name: Install Rclone
        run: |
          curl -O https://downloads.rclone.org/rclone-current-linux-amd64.zip
          unzip rclone-*-amd64.zip
          cd rclone-*-linux-amd64
          sudo mv rclone /usr/bin
          sudo chmod +x /usr/bin/rclone

      - name: Configure Rclone
        env:
          RCLONE_CONFIG: ${{ secrets.RCLONE }}
        run: |
          mkdir -p ~/.config/rclone/
          cat << EOF > ~/.config/rclone/rclone.conf
          $RCLONE_CONFIG
          EOF

      - name: Mount Dropbox
        run: |
          sudo apt-get install fuse3
          sudo mkdir -p /dropbox
          
          # 挂载 Dropbox
          sudo nohup rclone mount dropbox: /dropbox \
            --allow-non-empty \
            --no-gzip-encoding \
            --umask 000 \
            --allow-other \
            --attr-timeout 10m \
            --vfs-cache-mode full \
            --vfs-cache-max-age 5m \
            --vfs-read-chunk-size-limit 10G \
            --buffer-size 100M \
            --vfs-cache-max-size 10G &
          
          echo "Waiting for mount..."
          sleep 10
          
          # 确保云端主目录存在
          sudo mkdir -p /dropbox/self-hosted/openclaw
          # 确保存放数据的 CLIProxyAPI 目录存在
          sudo mkdir -p /dropbox/self-hosted/CLIProxyAPI

      - name: Install Cloudflared
        run: |
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared-linux-amd64.deb
          sudo mkdir -p ~/.cloudflared/
          sudo cp -r /dropbox/self-hosted/.cloudflared/* ~/.cloudflared/ 2>/dev/null || true

      - name: Run Cloudflared Tunnel
        run: |
          # 提前在 Dropbox 挂载目录中创建 logs 文件夹并赋予权限
          sudo mkdir -p /dropbox/self-hosted/openclaw/logs
          
          cloudflared tunnel route dns oc oc.'${{ secrets.VD }}'.eu.org || true

          # 启动隧道并记录 PID
          # 使用 nohup 配合重定向，确保进程在后台稳健运行，日志直接写入 Dropbox
          nohup cloudflared tunnel run --url http://127.0.0.1:18789 oc \
            > /dropbox/self-hosted/openclaw/logs/cloudflared_oc.log 2>&1 &
          
          # 等待一小段时间确保进程启动成功并记录 PID
          sleep 10
          echo $! > /dropbox/self-hosted/openclaw/logs/cloudflared_oc.pid

      - name: Run CLIProxyAPI container
        run: |
          echo "Configuring local high-speed CLIProxyAPI directory..."
          mkdir -p /dropbox/self-hosted/CLIProxyAPI
          mkdir -p /tmp/local_CLIProxyAPI

          # 优先从压缩包恢复；没有压缩包时再回退为目录同步
          if rclone ls dropbox:self-hosted/CLIProxyAPI.tar.gz > /dev/null 2>&1; then
            echo "📦 Found CLIProxyAPI.tar.gz! Downloading and extracting..."
            rclone copyto dropbox:self-hosted/CLIProxyAPI.tar.gz /tmp/CLIProxyAPI.tar.gz
            MIN_SIZE=$((1 * 1024 * 1024)) # 调整为 1MB
            actual_size=$(stat -c%s /tmp/CLIProxyAPI.tar.gz 2>/dev/null || echo 0)
            if [ "$actual_size" -ge "$MIN_SIZE" ]; then
              tar -xzf /tmp/CLIProxyAPI.tar.gz -C /tmp/local_CLIProxyAPI
            else
              echo "⚠️ CLIProxyAPI.tar.gz is smaller than expected, skipping restore."
            fi
            rm -f /tmp/CLIProxyAPI.tar.gz
          else
            echo "⚠️ No CLIProxyAPI archive found. Falling back to sync from raw directory..."
            rclone copy dropbox:self-hosted/CLIProxyAPI /tmp/local_CLIProxyAPI
          fi

          # 【防崩溃机制】在宿主机提前创建好文件和目录，防止 Docker 误建文件夹
          mkdir -p /tmp/local_CLIProxyAPI/auth-dir
          touch /tmp/local_CLIProxyAPI/config.yaml

          # 先清理同名旧容器，避免名称冲突
          docker rm -f cliproxyapi 2>/dev/null || true

          # 使用重启策略守护 CLIProxyAPI；直接挂载本地 /tmp/local_CLIProxyAPI 目录
          docker run -d \
            --name cliproxyapi \
            --restart unless-stopped \
            -p 8317:8317 \
            -v /tmp/local_CLIProxyAPI/config.yaml:/CLIProxyAPI/config.yaml \
            -v /tmp/local_CLIProxyAPI/auth-dir:/root/.cli-proxy-api \
            eceasy/cli-proxy-api:latest
          
          echo "等待 CLIProxyAPI 容器初步启动..."
          sleep 10
          docker ps -a
          
          echo "📥 开始执行 CLIProxyAPI 历史统计数据导入（前台立即执行）..."

          # 从本地临时目录读取 stats.json
          if [ -f /tmp/local_CLIProxyAPI/stats.json ]; then
              SUCCESS=false
              # 增加重试机制：最多尝试 360 次，每次间隔 10 秒
              for i in {1..360}; do
                  echo "🔁 CLIProxyAPI 历史统计导入重试次数：${i}/360"
                  if curl -sS -X POST "http://127.0.0.1:8317/v0/management/usage/import" \
                      -H "Content-Type: application/json" \
                      -H "X-Management-Key: ${{ secrets.CLIPROXYAPIKEY }}" \
                      -d @/tmp/local_CLIProxyAPI/stats.json > /dev/null 2>&1; then
                      echo -e "\n✅ CLIProxyAPI 历史统计导入执行完毕。"
                      SUCCESS=true
                      break
                  else
                      echo "⚠️ CLIProxyAPI 历史统计导入失败，10 秒后重试。"
                      sleep 10
                  fi
              done

              # 如果彻底失败，打印出容器的内部报错日志
              if [ "$SUCCESS" = false ]; then
                  echo "❌ CLIProxyAPI 历史统计导入彻底失败！正在提取 CLIProxyAPI 容器的运行日志："
                  docker logs $(docker ps -q --filter ancestor=eceasy/cli-proxy-api:latest)
              fi
          else
              echo "ℹ️ 云端未找到 stats.json 存档文件，本次为全新统计。"
          fi
          
          # 运行 8317 端口的命名隧道，并将输出保存到 Dropbox
          nohup cloudflared tunnel run --protocol http2 --url http://127.0.0.1:8317 ai-api \
            > /dropbox/self-hosted/openclaw/logs/cloudflared_CLIProxyAPI.log 2>&1 &

          sleep 10
          echo $! > /dropbox/self-hosted/openclaw/logs/cloudflared_CLIProxyAPI.pid

          echo "CLIProxyAPI 命名隧道已启动：ai-api（固定地址模式）"

      - name: Install OpenClaw
        run: |
          echo "Installing OpenClaw base..."
          curl -fsSL https://openclaw.ai/install.sh | bash -s -- --no-onboard
          
          echo "/home/runner/.npm-global/bin" >> $GITHUB_PATH
          # 显式在当前 step 导入 PATH，确保 command -v 能够找到命令
          export PATH="/home/runner/.npm-global/bin:$PATH"

          echo "Configuring ~/.openclaw symlink and local directories..."
          # 1. 确保云端的占位目录存在
          mkdir -p /dropbox/self-hosted/openclaw/browser
          mkdir -p /dropbox/self-hosted/openclaw/extensions
          mkdir -p /dropbox/self-hosted/openclaw/tmp_workspace
          
          # 2. 建立本地临时高速目录，用于存放真实数据
          mkdir -p /tmp/local_browser
          mkdir -p /tmp/local_extensions
          mkdir -p /tmp/tmp_workspace
          
          # 3. 使用 bind mount 将本地目录挂载到云端目录上，阻断高频 I/O 同步
          sudo mount --bind /tmp/local_browser /dropbox/self-hosted/openclaw/browser
          sudo mount --bind /tmp/local_extensions /dropbox/self-hosted/openclaw/extensions
          sudo mount --bind /tmp/tmp_workspace /dropbox/self-hosted/openclaw/tmp_workspace
          
          # 4. 创建 ~/.openclaw 软链接指向云端主目录
          rm -rf ~/.openclaw
          ln -s /dropbox/self-hosted/openclaw ~/.openclaw

          # 统一的体积校验阈值
          MIN_SIZE=$((512 * 1024)) # 512KB

          # 5. 拉取 browser 逻辑
          if rclone ls dropbox:self-hosted/openclaw/browser.tar.gz > /dev/null 2>&1; then
            echo "📦 Found browser.tar.gz! Downloading and extracting..."
            rclone copyto dropbox:self-hosted/openclaw/browser.tar.gz /tmp/browser.tar.gz
            actual_size=$(stat -c%s /tmp/browser.tar.gz 2>/dev/null || echo 0)
            if [ "$actual_size" -ge "$MIN_SIZE" ]; then
              tar -xzf /tmp/browser.tar.gz -C /tmp/local_browser
            else
              echo "⚠️ browser.tar.gz is smaller than expected, skipping restore."
            fi
            sudo rm /tmp/browser.tar.gz
          else
            echo "⚠️ No browser archive found. Falling back to sync from raw directory..."
            rclone copy dropbox:self-hosted/openclaw/browser /tmp/local_browser
          fi

          # 6. 拉取 tmp_workspace 逻辑
          if rclone ls dropbox:self-hosted/openclaw/tmp_workspace.tar.gz > /dev/null 2>&1; then
            echo "📦 Found tmp_workspace.tar.gz! Downloading and extracting..."
            rclone copyto dropbox:self-hosted/openclaw/tmp_workspace.tar.gz /tmp/tmp_workspace.tar.gz
            actual_size=$(stat -c%s /tmp/tmp_workspace.tar.gz 2>/dev/null || echo 0)
            if [ "$actual_size" -ge "$MIN_SIZE" ]; then
              tar -xzf /tmp/tmp_workspace.tar.gz -C /tmp/tmp_workspace
            else
              echo "⚠️ tmp_workspace.tar.gz is smaller than expected, skipping restore."
            fi
            sudo rm /tmp/tmp_workspace.tar.gz
          else
            echo "⚠️ No tmp_workspace archive found. Falling back to sync from raw directory..."
            rclone copy dropbox:self-hosted/openclaw/tmp_workspace /tmp/tmp_workspace
          fi

          # 自动修正历史错误打包导致的 tmp_workspace/tmp_workspace 嵌套
          if [ -d /tmp/tmp_workspace/tmp_workspace ]; then
            echo "⚠️ Detected nested tmp_workspace after restore, flattening..."
            shopt -s dotglob nullglob
            mv /tmp/tmp_workspace/tmp_workspace/* /tmp/tmp_workspace/
            rmdir /tmp/tmp_workspace/tmp_workspace || true
            shopt -u dotglob nullglob
          fi

          # 7. 微信插件：每次运行都在 bind mount 的本地 extensions 中幂等安装/修复，默认跳过扫码
          REAL_OPENCLAW="$(readlink -f "$(command -v openclaw)")"
          mkdir -p /tmp/openclaw-wrapper-bin
          
          # 注意：对 $1, $2, $HOME, $@ 增加了 \ 转义，保留其作为脚本运行期变量
          cat >/tmp/openclaw-wrapper-bin/openclaw <<EOF
          #!/usr/bin/env bash
          set -e
          REAL_OPENCLAW="$REAL_OPENCLAW"
          if [ "\${1:-}" = "channels" ] && [ "\${2:-}" = "login" ] && [ "\${3:-}" = "--channel" ] && [ "\${4:-}" = "openclaw-weixin" ]; then
            if [ -s "\$HOME/.openclaw/openclaw-weixin/accounts.json" ] || find "\$HOME/.openclaw/openclaw-weixin/accounts" -type f -print -quit 2>/dev/null | grep -q .; then
              echo "[openclaw-weixin] 检测到已持久化的微信登录态，跳过引导扫码。"
            else
              echo "[openclaw-weixin] 未发现已持久化登录态；当前 workflow 默认跳过交互式扫码连接。"
            fi
            exit 0
          fi
          
          # 这里的 \$@ 非常关键，确保它能透传 --version 等参数
          exec "\$REAL_OPENCLAW" "\$@"
          EOF
          
          chmod +x /tmp/openclaw-wrapper-bin/openclaw
          export PATH="/tmp/openclaw-wrapper-bin:$PATH"
          echo "📦 Running openclaw-weixin installer on bind-mounted local extensions (login step suppressed)..."
          # npx -y @tencent-weixin/openclaw-weixin-cli@latest install

          # 初步安装完备份校验逻辑
          TMP_BROWSER_TAR="/tmp/browser-backup.tar.gz"
          FINAL_BROWSER_TAR="/dropbox/self-hosted/openclaw/browser.tar.gz"
          TMP_WORKSPACE_TAR="/tmp/tmp-workspace-backup.tar.gz"
          FINAL_WORKSPACE_TAR="/dropbox/self-hosted/openclaw/tmp_workspace.tar.gz"
          TMP_CLIPROXYAPI_TAR="/tmp/CLIProxyAPI-backup.tar.gz"
          FINAL_CLIPROXYAPI_TAR="/dropbox/self-hosted/CLIProxyAPI.tar.gz"

          sudo tar -czf "$TMP_BROWSER_TAR" -C /tmp/local_browser .
          browser_size=$(stat -c%s "$TMP_BROWSER_TAR" 2>/dev/null || echo 0)
          if [ "$browser_size" -ge "$MIN_SIZE" ] && sudo tar -tzf "$TMP_BROWSER_TAR" >/dev/null 2>&1; then
            sudo mv -f "$TMP_BROWSER_TAR" "$FINAL_BROWSER_TAR"
          else
            echo "⚠️ browser backup archive failed validation; skip promote."
            sudo rm -f "$TMP_BROWSER_TAR"
          fi

          sudo tar -czf "$TMP_WORKSPACE_TAR" -C /tmp/tmp_workspace .
          workspace_size=$(stat -c%s "$TMP_WORKSPACE_TAR" 2>/dev/null || echo 0)
          if [ "$workspace_size" -ge "$MIN_SIZE" ] && sudo tar -tzf "$TMP_WORKSPACE_TAR" >/dev/null 2>&1; then
            sudo mv -f "$TMP_WORKSPACE_TAR" "$FINAL_WORKSPACE_TAR"
          else
            echo "⚠️ tmp_workspace backup archive failed validation; skip promote."
            sudo rm -f "$TMP_WORKSPACE_TAR"
          fi

          sudo tar -czf "$TMP_CLIPROXYAPI_TAR" -C /tmp local_CLIProxyAPI
          cliproxyapi_size=$(stat -c%s "$TMP_CLIPROXYAPI_TAR" 2>/dev/null || echo 0)
          if [ "$cliproxyapi_size" -ge "$MIN_SIZE" ] && sudo tar -tzf "$TMP_CLIPROXYAPI_TAR" >/dev/null 2>&1; then
            sudo mv -f "$TMP_CLIPROXYAPI_TAR" "$FINAL_CLIPROXYAPI_TAR"
          else
            echo "⚠️ CLIProxyAPI backup archive failed validation; skip promote."
            sudo rm -f "$TMP_CLIPROXYAPI_TAR"
          fi
          
          mkdir -p ~/.gemini
          chmod 700 ~/.gemini
          npm install -g @google/gemini-cli
          echo "Checking gemini version..."
          gemini --version || echo "gemini not found in PATH"
          npm i -g clawhub
          
      - name: Run OpenClaw
        run: |
          echo "🔧 Fixing file permissions to pass security checks..."
          sudo chmod -R o-w $(npm root -g)
          sudo chmod 700 ~/.openclaw
          if [ -f ~/.openclaw/openclaw.json ]; then
            sudo chmod 600 ~/.openclaw/openclaw.json
          fi

          echo "Restarting OpenClaw gateway..."
          openclaw gateway install --force
          openclaw gateway restart
          
          echo "Waiting for OpenClaw ..."
          sleep 10
          
          if sudo lsof -Pi :18789 -sTCP:LISTEN -t >/dev/null ; then
              echo "✅ OpenClaw Gateway is running!"
          else
              echo "⚠️ Gateway not responding yet. Checking logs:"
              tail -n 20 openclaw.log || echo "No log file found."
              
              echo "🛠️ Attempting to fix with 'openclaw doctor --fix'..."
              openclaw doctor --fix
              openclaw gateway install
              openclaw gateway restart
              
              echo "Waiting for OpenClaw after doctor fix..."
              sleep 15
              
              if sudo lsof -Pi :18789 -sTCP:LISTEN -t >/dev/null ; then
                  echo "✅ OpenClaw Gateway is running after doctor fix!"
              else
                  echo "🔄 Doctor fix failed. Attempting to fallback and reinstall specific OpenClaw version..."
                  
                  CONFIG_FILE="/dropbox/self-hosted/openclaw/openclaw.json"
                  TARGET_VERSION="latest" 
                  
                  if [ -s "$CONFIG_FILE" ]; then
                    READ_VERSION=$(sudo jq -r '.wizard.lastRunVersion // empty' "$CONFIG_FILE" 2>/dev/null)
                    if [ -n "$READ_VERSION" ]; then
                      TARGET_VERSION="$READ_VERSION"
                      echo "✅ Found version in config: $TARGET_VERSION"
                    else
                      echo "⚠️ Version key not found in JSON, using fallback: $TARGET_VERSION"
                    fi
                  else
                    echo "⚠️ Config file STILL not found or empty at $CONFIG_FILE. Using fallback: $TARGET_VERSION"
                  fi

                  echo "Installing openclaw@$TARGET_VERSION ..."
                  npm i -g "openclaw@$TARGET_VERSION"
                  
                  sudo chmod -R o-w $(npm root -g)
                  sudo chmod 700 ~/.openclaw
                  if [ -f ~/.openclaw/openclaw.json ]; then
                    sudo chmod 600 ~/.openclaw/openclaw.json
                  fi
                  
                  echo "Restarting OpenClaw..."
                  openclaw gateway install --force
                  openclaw gateway restart
              fi
          fi
          
          # 后台每 2 分钟导出 CLIProxyAPI 统计，并打包 browser/tmp_workspace/CLIProxyAPI 同步回 Dropbox
          echo "Starting background sync tasks: export CLIProxyAPI stats + archive local directories -> Dropbox (every 120s)..."
          nohup bash -c 'while true; do 
            MIN_SIZE=$((512 * 1024)) # 512KB

            # 导出 CLIProxyAPI 统计数据到本地临时目录
            curl -sS -X GET "http://127.0.0.1:8317/v0/management/usage/export" \
              -H "X-Management-Key: ${{ secrets.CLIPROXYAPIKEY }}" \
              -o /tmp/local_CLIProxyAPI/stats.json || echo "⚠️ 周期性导出 CLIProxyAPI 统计失败"

            # 备份 browser
            sudo tar -czf /tmp/browser.tar.gz -C /tmp/local_browser .
            if sudo tar -tzf /tmp/browser.tar.gz >/dev/null 2>&1; then
              actual_size=$(stat -c%s /tmp/browser.tar.gz 2>/dev/null || echo 0)
              if [ "$actual_size" -ge "$MIN_SIZE" ]; then
                rclone copyto /tmp/browser.tar.gz dropbox:self-hosted/openclaw/browser.tar.gz
              fi
            fi

            # 备份 tmp_workspace
            if [ -d /tmp/tmp_workspace/tmp_workspace ]; then
              echo "⚠️ Detected nested tmp_workspace before periodic backup, flattening..."
              shopt -s dotglob nullglob
              mv /tmp/tmp_workspace/tmp_workspace/* /tmp/tmp_workspace/
              rmdir /tmp/tmp_workspace/tmp_workspace || true
              shopt -u dotglob nullglob
            fi
            sudo tar -czf /tmp/tmp_workspace.tar.gz -C /tmp/tmp_workspace .
            if sudo tar -tzf /tmp/tmp_workspace.tar.gz >/dev/null 2>&1; then
              actual_size=$(stat -c%s /tmp/tmp_workspace.tar.gz 2>/dev/null || echo 0)
              if [ "$actual_size" -ge "$MIN_SIZE" ]; then
                rclone copyto /tmp/tmp_workspace.tar.gz dropbox:self-hosted/openclaw/tmp_workspace.tar.gz
              fi
            fi

            # 备份 CLIProxyAPI 目录
            sudo tar -czf /tmp/CLIProxyAPI.tar.gz -C /tmp/local_CLIProxyAPI .
            if sudo tar -tzf /tmp/CLIProxyAPI.tar.gz >/dev/null 2>&1; then
              actual_size=$(stat -c%s /tmp/CLIProxyAPI.tar.gz 2>/dev/null || echo 0)
              if [ "$actual_size" -ge "$MIN_SIZE" ]; then
                rclone copyto /tmp/CLIProxyAPI.tar.gz dropbox:self-hosted/CLIProxyAPI.tar.gz
              fi
            fi
            
            sleep 120
          done' > /dev/null 2>&1 &

          sleep 340m
          
      - name: Stop OpenClaw and Final Sync
        if: always()
        run: |
          echo "💾 正在通过 API 导出 CLIProxyAPI 统计数据到本地缓存..."
          curl -sS -X GET "http://127.0.0.1:8317/v0/management/usage/export" \
              -H "X-Management-Key: ${{ secrets.CLIPROXYAPIKEY }}" \
              -o /tmp/local_CLIProxyAPI/stats.json || echo "⚠️ 导出请求失败"
          echo "✅ 统计数据存档指令已执行。"

          echo "1. Stopping OpenClaw gateway..."
          openclaw gateway stop || echo "OpenClaw already stopped or command failed."
          
          echo "2. Killing background sync process..."
          pkill -f "CLIProxyAPI.tar.gz\|browser.tar.gz\|tmp_workspace.tar.gz" || echo "Background sync not running."
          
          echo "3. Performing final archive and sync to Dropbox..."
          MIN_SIZE=$((512 * 1024)) # 512KB

          # 打包并上传 browser
          sudo tar -czf /tmp/browser.tar.gz -C /tmp/local_browser .
          if sudo tar -tzf /tmp/browser.tar.gz >/dev/null 2>&1; then
            actual_size=$(stat -c%s /tmp/browser.tar.gz 2>/dev/null || echo 0)
            if [ "$actual_size" -ge "$MIN_SIZE" ]; then
              rclone copyto /tmp/browser.tar.gz dropbox:self-hosted/openclaw/browser.tar.gz -v
            else
              echo "⚠️ browser 压缩包小于 512KB，放弃覆盖云端数据"
            fi
          fi

          # 打包并上传 tmp_workspace
          if [ -d /tmp/tmp_workspace/tmp_workspace ]; then
            echo "⚠️ Detected nested tmp_workspace before final backup, flattening..."
            shopt -s dotglob nullglob
            mv /tmp/tmp_workspace/tmp_workspace/* /tmp/tmp_workspace/
            rmdir /tmp/tmp_workspace/tmp_workspace || true
            shopt -u dotglob nullglob
          fi
          sudo tar -czf /tmp/tmp_workspace.tar.gz -C /tmp/tmp_workspace .
          if sudo tar -tzf /tmp/tmp_workspace.tar.gz >/dev/null 2>&1; then
            actual_size=$(stat -c%s /tmp/tmp_workspace.tar.gz 2>/dev/null || echo 0)
            if [ "$actual_size" -ge "$MIN_SIZE" ]; then
              rclone copyto /tmp/tmp_workspace.tar.gz dropbox:self-hosted/openclaw/tmp_workspace.tar.gz -v
            else
              echo "⚠️ tmp_workspace 压缩包小于 512KB，放弃覆盖云端数据"
            fi
          fi

          # 打包并上传 CLIProxyAPI
          sudo tar -czf /tmp/CLIProxyAPI.tar.gz -C /tmp/local_CLIProxyAPI .
          if sudo tar -tzf /tmp/CLIProxyAPI.tar.gz >/dev/null 2>&1; then
            actual_size=$(stat -c%s /tmp/CLIProxyAPI.tar.gz 2>/dev/null || echo 0)
            if [ "$actual_size" -ge "$MIN_SIZE" ]; then
              rclone copyto /tmp/CLIProxyAPI.tar.gz dropbox:self-hosted/CLIProxyAPI.tar.gz -v
            else
              echo "⚠️ CLIProxyAPI 压缩包小于 512KB，放弃覆盖云端数据"
            fi
          fi
          
          echo "4. Unmounting local directories..."
          sudo umount /dropbox/self-hosted/openclaw/browser || true
          sudo umount /dropbox/self-hosted/openclaw/extensions || true
          sudo umount /dropbox/self-hosted/openclaw/tmp_workspace || true
          # 注：已不再对 CLIProxyAPI 进行 bind mount，所以不再需要对其 umount
          
          echo "✅ Final data sync complete. Environment cleaned up."
