name: openclaw

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:
  
jobs:
  build:
    concurrency: openclaw-singleton
    runs-on: ubuntu-latest
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 'current' # 始终使用官方发布的最新版

      - name: Install Rclone
        run: |
          curl -O https://downloads.rclone.org/rclone-current-linux-amd64.zip
          unzip rclone-*-amd64.zip
          cd rclone-*-linux-amd64
          sudo mv rclone /usr/bin
          sudo chmod +x /usr/bin/rclone

      - name: Configure Rclone
        env:
          RCLONE_CONFIG: ${{ secrets.RCLONE }}
        run: |
          mkdir -p ~/.config/rclone/
          cat << EOF > ~/.config/rclone/rclone.conf
          $RCLONE_CONFIG
          EOF

      - name: Mount Dropbox
        run: |
          sudo apt-get install fuse3
          sudo mkdir -p /dropbox
          
          # 挂载 Dropbox
          sudo nohup rclone mount dropbox: /dropbox \
            --allow-non-empty \
            --no-gzip-encoding \
            --umask 000 \
            --allow-other \
            --attr-timeout 10m \
            --vfs-cache-mode full \
            --vfs-cache-max-age 5m \
            --vfs-read-chunk-size-limit 10G \
            --buffer-size 100M \
            --vfs-cache-max-size 10G &
          
          echo "Waiting for mount..."
          sleep 10
          
          # 确保目录存在
          sudo mkdir -p /dropbox/self-hosted/openclaw

      - name: Install Cloudflared
        run: |
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared-linux-amd64.deb
          sudo mkdir -p ~/.cloudflared/
          sudo cp -r /dropbox/self-hosted/.cloudflared/* ~/.cloudflared/ 2>/dev/null || true

      - name: Run Cloudflared Tunnel
        run: |
          cloudflared tunnel route dns oc oc.'${{ secrets.VD }}'.eu.org
          nohup cloudflared tunnel run --url http://127.0.0.1:18789 oc &

      - name: Run CLIProxyAPI container
        run: |
          docker run -d --rm -p 8317:8317 -v /dropbox/self-hosted/CLIProxyAPI/config.yaml:/CLIProxyAPI/config.yaml -v /dropbox/self-hosted/CLIProxyAPI/auth-dir:/root/.cli-proxy-api eceasy/cli-proxy-api:latest
          sleep 10
          docker ps -a
          
          # 运行 8317 端口的临时隧道，并将输出保存到文件
          nohup cloudflared tunnel --url http://127.0.0.1:8317 > cf_tmp.log 2>&1 &
          
          # 等待几秒钟让隧道建立连接
          echo "等待隧道启动并获取 URL..."
          sleep 10
          
          # 从日志中提取 trycloudflare.com 域名并打印
          echo "------------------------------------------------"
          echo "临时隧道访问地址如下："
          grep -o 'https://[-0-9a-z]*\.trycloudflare.com' cf_tmp.log || echo "未能提取到 URL，请检查日志。"
    
      # - name: Run antigravity-manager container
      #   run: |
      #     ${{ secrets.ANTIGRAVITY_MANAGER }}
      #     sleep 1m
      #     docker ps -a
          
      #     # 运行 8045 端口的临时隧道，并将输出保存到文件
      #     nohup cloudflared tunnel --url http://127.0.0.1:8045 > cf_tmp.log 2>&1 &
          
      #     # 等待几秒钟让隧道建立连接
      #     echo "等待隧道启动并获取 URL..."
      #     sleep 10
          
      #     # 从日志中提取 trycloudflare.com 域名并打印
      #     echo "------------------------------------------------"
      #     echo "临时隧道访问地址如下："
      #     grep -o 'https://[-0-9a-z]*\.trycloudflare.com' cf_tmp.log || echo "未能提取到 URL，请检查日志。"
      #     echo "------------------------------------------------"
     
      - name: Install OpenClaw
        run: |
          # 安装 OpenClaw 依赖
          echo "Installing OpenClaw base..."
          curl -fsSL https://openclaw.ai/install.sh | bash -s -- --no-onboard
          
          echo "/home/runner/.npm-global/bin" >> $GITHUB_PATH

          # 设置主配置目录软链接
          rm -rf ~/.openclaw
          ln -s /dropbox/self-hosted/openclaw ~/.openclaw
          echo "Symlink created: ~/.openclaw -> /dropbox/self-hosted/openclaw"

          npm install -g @google/gemini-cli
          echo "Checking gemini version..."
          gemini --version || echo "gemini not found in PATH"
          npm i -g clawhub
          
      - name: Run OpenClaw
        run: |
          npm i -g "openclaw@2026.3.1"
          echo "🔧 Fixing file permissions to pass security checks..."
          # 1. 移除 npm 全局目录的 world-writable (其他人可写) 权限
          sudo chmod -R o-w $(npm root -g)
          
          # 2. 收紧 OpenClaw 状态目录和配置文件的权限
          mkdir -p ~/.openclaw
          chmod 700 ~/.openclaw
          if [ -f ~/.openclaw/openclaw.json ]; then
            chmod 600 ~/.openclaw/openclaw.json
          fi

          echo "Restarting OpenClaw gateway..."
          openclaw gateway install --force
          openclaw gateway restart
          
          echo "Waiting for OpenClaw ..."
          sleep 10
          
          # 首次检查端口是否启动
          if sudo lsof -Pi :18789 -sTCP:LISTEN -t >/dev/null ; then
              echo "✅ OpenClaw Gateway is running!"
          else
              echo "⚠️ Gateway not responding yet. Checking logs:"
              tail -n 20 openclaw.log || echo "No log file found."
              
              echo "🛠️ Attempting to fix with 'openclaw doctor --fix'..."
              openclaw doctor --fix
              openclaw gateway install
              openclaw gateway restart
              
              echo "Waiting for OpenClaw after doctor fix..."
              sleep 15
              
              # 再次检查端口是否启动
              if sudo lsof -Pi :18789 -sTCP:LISTEN -t >/dev/null ; then
                  echo "✅ OpenClaw Gateway is running after doctor fix!"
              else
                  echo "🔄 Doctor fix failed. Attempting to fallback and reinstall specific OpenClaw version..."
                  
                  CONFIG_FILE="/dropbox/self-hosted/openclaw/openclaw.json"
                  TARGET_VERSION="latest" 
                  
                  if [ -s "$CONFIG_FILE" ]; then
                    READ_VERSION=$(sudo jq -r '.wizard.lastRunVersion // empty' "$CONFIG_FILE" 2>/dev/null)
                    if [ -n "$READ_VERSION" ]; then
                      TARGET_VERSION="$READ_VERSION"
                      echo "✅ Found version in config: $TARGET_VERSION"
                    else
                      echo "⚠️ Version key not found in JSON, using fallback: $TARGET_VERSION"
                    fi
                  else
                    echo "⚠️ Config file STILL not found or empty at $CONFIG_FILE. Using fallback: $TARGET_VERSION"
                  fi

                  echo "Installing openclaw@$TARGET_VERSION ..."
                  npm i -g "openclaw@$TARGET_VERSION"
                  
                  # 重新安装后再次修复权限（以防降级安装又重置了权限）
                  sudo chmod -R o-w $(npm root -g)
                  
                  echo "Restarting OpenClaw..."
                  openclaw gateway install --force
                  openclaw gateway restart
              fi
          fi
          
          sleep 10m
      
      - name: Run tmate
        uses: mxschmitt/action-tmate@v3
        timeout-minutes: 350
        with:
          limit-access-to-actor: true # 顺便解决你之前提到的 SSH 输出刷屏问题
