name: self-hosted_backup

on:
  schedule:
    - cron: '0 2 * * *' # 每天凌晨2点运行
  workflow_dispatch:

concurrency:
  group: self-hosted-backup
  cancel-in-progress: false

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Setup rclone
        run: |
          sudo apt-get install -y rclone
          mkdir -p ~/.config/rclone/
          echo "${{ secrets.RCLONE }}" > ~/.config/rclone/rclone.conf

      - name: Download, Compress and Backup
        run: |
          DATE=$(date +'%Y-%m-%d')
          ARCHIVE_NAME="self-hosted_$DATE.tar.gz"
          
          echo "Downloading self-hosted data from Dropbox..."
          # 从 Dropbox 下载数据到本地 actions 服务器
          rclone copy "dropbox:self-hosted" "./self-hosted" -P --retries 3
          
          echo "Compressing data..."
          # 将下载的数据压缩打包
          tar -czf "$ARCHIVE_NAME" "./self-hosted"
          
          echo "Uploading archive to Dropbox..."
          # 上传压缩包到 Dropbox 备份目录
          rclone copy "$ARCHIVE_NAME" "dropbox:self-hosted_backup/" -P --retries 3
          
      - name: Rotate old backups (Keep 14 days)
        run: |
          echo "Cleaning up old backups..."
          # 清除 14 天前的历史备份包
          rclone delete "dropbox:self-hosted_backup/" --min-age 14d -v

      - name: Send Telegram Notification
        if: always()
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          STATUS: ${{ job.status }}
        run: |
          if [ -z "$TG_BOT_TOKEN" ] || [ -z "$TG_CHAT_ID" ]; then
            echo "Telegram 凭证未配置，跳过发送通知。"
            exit 0
          fi
          
          if [ "$STATUS" == "success" ]; then
            MSG="✅ <b>Self-Hosted 数据备份成功</b>%0A📅 日期: $(date +'%Y-%m-%d')%0A📦 目的地: Dropbox/self-hosted_backup"
          else
            MSG="❌ <b>Self-Hosted 数据备份失败</b>%0A⚠️ 请前往 GitHub Actions 检查日志详情。"
          fi
          
          curl -s -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TG_CHAT_ID}" \
            -d text="$(echo -e $MSG)" \
            -d parse_mode="HTML"
