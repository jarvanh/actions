name: self-hosted_backup

on:
  schedule:
    - cron: '0 2 * * *' # 每天凌晨2点运行
  workflow_dispatch:

concurrency:
  group: self-hosted-backup
  cancel-in-progress: false

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Setup rclone
        env:
          RCLONE_CONFIG: ${{ secrets.RCLONE }}
        run: |
          sudo apt-get update
          sudo apt-get install -y rclone
          mkdir -p ~/.config/rclone/
          printf "%s" "$RCLONE_CONFIG" > ~/.config/rclone/rclone.conf

      - name: Download, Compress and Backup
        run: |
          set -euo pipefail
          cleanup_backup_workdir() {
            rm -f self-hosted_latest.tar.gz 2>/dev/null || true
            rm -rf self-hosted.tmp 2>/dev/null || true
          }
          free_kb() { df -Pk "${1:-.}" | awk 'NR==2 {print $4}'; }
          require_free_kb() {
            local path="$1" min_kb="$2" label="$3"
            local avail
            avail=$(free_kb "$path")
            if [ "${avail:-0}" -lt "$min_kb" ]; then
              echo "❌ ${label}: insufficient free space at ${path}. available=${avail}KB required=${min_kb}KB" >&2
              exit 1
            fi
            echo "✅ ${label}: free space ok at ${path}. available=${avail}KB required=${min_kb}KB"
          }
          require_free_kb "." $((5 * 1024 * 1024)) "self-hosted backup initial preflight"
          trap cleanup_backup_workdir EXIT
          # 💡 修改：直接使用固定文件名 self-hosted_latest.tar.gz，从而覆盖旧文件
          ARCHIVE_NAME="self-hosted_latest.tar.gz"
          
          echo "Phase 1: Initial full download..."
          rclone sync "dropbox:self-hosted" "./self-hosted" -P --retries 3 \
            --exclude "**/logs/**" \
            --exclude "**/cache/**" \
            --exclude "**/.cache/**" \
            --exclude "**/tmp/**" \
            --exclude "**/*.log" \
            --exclude "**/*.tmp"
            
          echo "Phase 2: Catch-up sync 1 (Delta)..."
          sleep 5
          rclone sync "dropbox:self-hosted" "./self-hosted" -P --retries 3 \
            --exclude "**/logs/**" \
            --exclude "**/cache/**" \
            --exclude "**/.cache/**" \
            --exclude "**/tmp/**" \
            --exclude "**/*.log" \
            --exclude "**/*.tmp"
            
          echo "Phase 3: Catch-up sync 2 (Final Delta)..."
          sleep 5
          rclone sync "dropbox:self-hosted" "./self-hosted" -P --retries 3 \
            --exclude "**/logs/**" \
            --exclude "**/cache/**" \
            --exclude "**/.cache/**" \
            --exclude "**/tmp/**" \
            --exclude "**/*.log" \
            --exclude "**/*.tmp"
          
          echo "Compressing data..."
          src_kb=$(du -sk ./self-hosted | awk '{print $1}')
          if [ -z "${src_kb:-}" ] || [ "$src_kb" -le 0 ]; then
            echo "❌ self-hosted archive preflight: unable to calculate source size" >&2
            exit 1
          fi
          echo "待压缩目录大小: ${src_kb}KB"
          require_free_kb "." $((src_kb + 1024 * 1024)) "self-hosted archive preflight"
          rm -f "$ARCHIVE_NAME"
          tar -czf "$ARCHIVE_NAME" "./self-hosted"
          archive_bytes=$(stat -c%s "$ARCHIVE_NAME")
          if [ -z "${archive_bytes:-}" ] || [ "$archive_bytes" -le 0 ]; then
            echo "❌ self-hosted archive validation: archive is empty" >&2
            exit 1
          fi
          tar -tzf "$ARCHIVE_NAME" >/dev/null
          archive_human=$(numfmt --to=iec-i --suffix=B "$archive_bytes" 2>/dev/null || echo "${archive_bytes}B")
          {
            echo "SELF_HOSTED_ARCHIVE_NAME=$ARCHIVE_NAME"
            echo "SELF_HOSTED_ARCHIVE_BYTES=$archive_bytes"
            echo "SELF_HOSTED_ARCHIVE_HUMAN=$archive_human"
          } >> "$GITHUB_ENV"
          echo "✅ 压缩包校验通过: ${ARCHIVE_NAME} (${archive_human})"
          
          echo "Uploading archive to OneDrive backup/ (Overwriting latest)..."
          # 💡 修改：使用 copy 命令上传同名文件，会自动覆盖 OneDrive backup/ 下的旧包
          rclone copy "$ARCHIVE_NAME" "onedrive:backup/" -P --retries 3
          rm -f "$ARCHIVE_NAME"
          
      - name: Send Telegram Notification
        if: always()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          STATUS: ${{ job.status }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "Telegram 凭证未配置，跳过发送通知。"
            exit 0
          fi
          
          if [ "$STATUS" == "success" ]; then
            ARCHIVE_NAME="${SELF_HOSTED_ARCHIVE_NAME:-self-hosted_latest.tar.gz}"
            FILE_SIZE_BYTES="${SELF_HOSTED_ARCHIVE_BYTES:-0}"
            FILE_SIZE_HUMAN=$(numfmt --to=iec-i --suffix=B "$FILE_SIZE_BYTES" 2>/dev/null || echo "${FILE_SIZE_BYTES}B")
            if [ "$FILE_SIZE_BYTES" -le 0 ]; then
              MSG="⚠️ <b>Self-Hosted 数据备份状态异常</b>%0A📅 日期: $(date +'%Y-%m-%d')%0A📦 文件: ${ARCHIVE_NAME}%0A📏 文件大小: ${FILE_SIZE_HUMAN}%0A⚠️ 备份任务成功但未记录到有效压缩包大小，请检查 GitHub Actions 日志。"
            else
            MSG="✅ <b>Self-Hosted 数据备份成功 (已覆盖旧包)</b>%0A📅 日期: $(date +'%Y-%m-%d')%0A📦 文件: ${ARCHIVE_NAME}%0A📏 文件大小: ${FILE_SIZE_HUMAN}"
            fi
          else
            MSG="❌ <b>Self-Hosted 数据备份失败</b>%0A⚠️ 请前往 GitHub Actions 检查日志详情。"
          fi
          
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d text="$(echo -e $MSG)" \
            -d parse_mode="HTML"
