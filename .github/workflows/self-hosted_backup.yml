name: self-hosted_backup

on:
  schedule:
    - cron: '0 2 * * *' # 每天凌晨2点运行
  workflow_dispatch:

concurrency:
  group: self-hosted-backup
  cancel-in-progress: false

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Setup rclone
        env:
          RCLONE_CONFIG: ${{ secrets.RCLONE }}
        run: |
          sudo apt-get install -y rclone
          mkdir -p ~/.config/rclone/
          printf "%s" "$RCLONE_CONFIG" > ~/.config/rclone/rclone.conf

      - name: Download, Compress and Backup
        run: |
          DATE=$(date +'%Y-%m-%d')
          ARCHIVE_NAME="self-hosted_$DATE.tar.gz"
          
          echo "Phase 1: Initial full download..."
          rclone sync "dropbox:self-hosted" "./self-hosted" -P --retries 3 \
            --exclude "**/logs/**" \
            --exclude "**/cache/**" \
            --exclude "**/.cache/**" \
            --exclude "**/tmp/**" \
            --exclude "**/*.log" \
            --exclude "**/*.tmp"
            
          echo "Phase 2: Catch-up sync 1 (Delta)..."
          sleep 5
          rclone sync "dropbox:self-hosted" "./self-hosted" -P --retries 3 \
            --exclude "**/logs/**" \
            --exclude "**/cache/**" \
            --exclude "**/.cache/**" \
            --exclude "**/tmp/**" \
            --exclude "**/*.log" \
            --exclude "**/*.tmp"
            
          echo "Phase 3: Catch-up sync 2 (Final Delta)..."
          sleep 5
          rclone sync "dropbox:self-hosted" "./self-hosted" -P --retries 3 \
            --exclude "**/logs/**" \
            --exclude "**/cache/**" \
            --exclude "**/.cache/**" \
            --exclude "**/tmp/**" \
            --exclude "**/*.log" \
            --exclude "**/*.tmp"
          
          echo "Compressing data..."
          tar -czf "$ARCHIVE_NAME" "./self-hosted"
          
          echo "Uploading archive to Dropbox..."
          rclone copy "$ARCHIVE_NAME" "dropbox:self-hosted_backup/" -P --retries 3
          
      - name: Rotate old backups (Keep 14 days)
        run: |
          echo "Cleaning up old backups..."
          rclone delete "dropbox:self-hosted_backup/" --min-age 14d -v

      - name: Send Telegram Notification
        if: always()
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          STATUS: ${{ job.status }}
        run: |
          if [ -z "$TG_BOT_TOKEN" ] || [ -z "$TG_CHAT_ID" ]; then
            echo "Telegram 凭证未配置，跳过发送通知。"
            exit 0
          fi
          
          if [ "$STATUS" == "success" ]; then
            MSG="✅ <b>Self-Hosted 数据备份成功</b>%0A📅 日期: $(date +'%Y-%m-%d')%0A📦 目的地: Dropbox/self-hosted_backup"
          else
            MSG="❌ <b>Self-Hosted 数据备份失败</b>%0A⚠️ 请前往 GitHub Actions 检查日志详情。"
          fi
          
          curl -s -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TG_CHAT_ID}" \
            -d text="$(echo -e $MSG)" \
            -d parse_mode="HTML"
