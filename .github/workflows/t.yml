name: t

on:
  schedule:
    # - cron: "0 2,8,14,20 * * *"
    - cron: "*/5 * * * *"
  workflow_dispatch:
  watch:
    # types: started

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check Workflow Status
        run: |
          workflow_runs=$(curl -s -X GET \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Authorization: Bearer ${{ secrets.PAT }}" \
            "https://api.github.com/repos/${{ github.repository }}/actions/runs")
          
          isRunning=$(echo "$workflow_runs" | jq '.workflow_runs[] | select(.name == "t" and .status == "in_progress")')
          
          if [[ -n $isRunning ]]; then
            echo "Another workflow is already running. Aborting current workflow."
            exit 31
          else
            echo "No running workflows found. Continuing with the workflow execution."
          fi
      - name: rclone-install
        run: |
          # 安装 rclone
          # curl -O https://downloads.rclone.org/rclone-current-linux-amd64.zip
          # curl -O https://beta.rclone.org/rclone-beta-latest-linux-amd64.zip
          # unzip rclone-*-amd64.zip
          # cd rclone-*-linux-amd64
          # sudo mv rclone /usr/bin
          # sudo chmod +x /usr/bin/rclone
          sudo apt-get install rclone
      - name: rclone-config
        env:
          RCLONE_CONFIG: ${{ secrets.RCLONE }}
        run: |
          # 写配置文件
          mkdir -p ~/.config/rclone/
          cat << EOF > ~/.config/rclone/rclone.conf
          $RCLONE_CONFIG
          EOF
      - name: rclone-run
        run: |
          sudo mkdir ~/teslamate/
          sudo rclone copy dropbox:self-hosted/teslamate ~/teslamate -vv
          # sudo apt-get install fuse3
          # sudo mkdir /dropbox
          # sudo nohup rclone mount dropbox: /dropbox --vfs-cache-mode full &
          # sudo ls /dropbox/self-hosted/teslamate
          echo "==========onedrive==========="
          rclone lsf onedrive:
          echo "==========dropbox==========="
          rclone lsf dropbox:
      - name: Set up Docker
        uses: docker/setup-buildx-action@v2
      - name: Run teslamate container
        # run: cd /dropbox/self-hosted/teslamate && docker compose up -d
        run: cd ~/teslamate && docker compose up -d
      - name: Verify docker container is running
        run: docker ps 
      - name: run cloudflared
        run: |
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared-linux-amd64.deb
          sudo mkdir ~/.cloudflared/
          sudo rclone copy dropbox:self-hosted/.cloudflared ~/.cloudflared -vv
          cloudflared tunnel route dns t t.'${{ secrets.VD }}'.us.kg
          nohup cloudflared tunnel run --url http://127.0.0.1:5900 t &
      - name: sleep
        run: |
          sudo sleep 350m          
      - name: Stop
        run: |
          docker stop teslamate
          sudo rclone sync ~/teslamate dropbox:self-hosted/teslamate -vv
          sleep 1m 
          echo "Stopping GitHub Actions"
          exit 1
